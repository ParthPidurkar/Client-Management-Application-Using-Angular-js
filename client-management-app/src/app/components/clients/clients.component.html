<div class="client-container">
    <h2>Client Management</h2>
  
    <!-- Client Form -->
    <form (ngSubmit)="onSubmit()">
      <mat-form-field class="full-width">
        <mat-label>Client Name</mat-label>
        <input matInput placeholder="Enter client name" [(ngModel)]="client.name" name="name" required>
      </mat-form-field>
  
      <mat-form-field class="full-width">
        <mat-label>Client Email</mat-label>
        <input matInput placeholder="Enter client email" [(ngModel)]="client.email" name="email" required>
      </mat-form-field>
  
      <mat-form-field class="full-width">
        <mat-label>Client Phone</mat-label>
        <input matInput placeholder="Enter client phone number" [(ngModel)]="client.phone" name="phone" required>
      </mat-form-field>
  
      <button mat-raised-button color="primary" type="submit">Add Client</button>
    </form>
  
    <!-- Client List Table -->
    <h3>Existing Clients</h3>
    <table mat-table [dataSource]="clients" class="mat-elevation-z8 full-width-table">
      <!-- Name Column -->
      <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef> Name </th>
        <td mat-cell *matCellDef="let client"> {{client.name}} </td>
      </ng-container>
  
      <!-- Email Column -->
      <ng-container matColumnDef="email">
        <th mat-header-cell *matHeaderCellDef> Email </th>
        <td mat-cell *matCellDef="let client"> {{client.email}} </td>
      </ng-container>
  
      <!-- Phone Column -->
      <ng-container matColumnDef="phone">
        <th mat-header-cell *matHeaderCellDef> Phone </th>
        <td mat-cell *matCellDef="let client"> {{client.phone}} </td>
      </ng-container>
  
      <!-- Table Header -->
      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <!-- Table Rows -->
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>
  </div>
